name: Monthly Portfolio Email

on:
  # Runs at 14:00 UTC on the 1st of every month = 11:00 AM ADT (UTC-3)
  # If you prefer a different day/time, adjust the cron expression:
  #   "0 14 1 * *"  = 1st of each month, 11:00 AM ADT
  #   "0 14 15 * *" = 15th of each month, 11:00 AM ADT
  schedule:
    - cron: "0 14 1 * *"

  # Also allows triggering manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  monthly-email:
    name: Send monthly TFSA + RRSP portfolio review email
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly portfolio email
        env:
          # ── Set these secrets in:
          #    GitHub repo → Settings → Secrets and variables → Actions → New repository secret
          #
          # SMTP_USER     : your Gmail address  (e.g. yourname@gmail.com)
          # SMTP_PASSWORD : Gmail App Password   (NOT your regular password)
          #                 Generate one at https://myaccount.google.com/apppasswords
          #                 (requires 2-Step Verification to be enabled on your Google account)
          # EMAIL_TO      : recipient address(es), comma-separated (can be the same as SMTP_USER)
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python main.py \
            --monthly-email "${{ secrets.EMAIL_TO }}"
